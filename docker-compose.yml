version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: bytime
      POSTGRES_PASSWORD: bytime_dev
      POSTGRES_DB: bytime
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
